<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 432" font-family="'SF Mono', ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace" xml:space="preserve">
  <defs>
    <style>
      .p { fill: #a78bfa; }
      .m { fill: #838b98; }
      .w { fill: #e9ecf3; }
      .c { fill: #c4b5fd; }
      text { font-size: 15px; }
    </style>
  </defs>

  <!-- window -->
  <rect x="8" y="8" width="804" height="416" rx="13" fill="#12151b" stroke="#262b35" stroke-width="1"/>
  <rect x="8" y="8" width="804" height="40" rx="13" fill="#15181e"/>
  <rect x="8" y="34" width="804" height="14" fill="#15181e"/>
  <circle cx="32" cy="28" r="6" fill="#ff5f57"/>
  <circle cx="52" cy="28" r="6" fill="#febc2e"/>
  <circle cx="72" cy="28" r="6" fill="#28c840"/>
  <text x="410" y="33" text-anchor="middle" class="m" font-size="13">onionhop — command line</text>
  <line x1="8" y1="48" x2="812" y2="48" stroke="#262b35" stroke-width="1"/>

  <!-- real startup banner -->
  <g class="p">
    <text x="30" y="82">   ___       _          _  _</text>
    <text x="30" y="102">  / _ \ _ _ (_)___ _ _ | || |___ _ __</text>
    <text x="30" y="122"> | (_) | ' \| / _ \ ' \| __ / _ \ '_ \</text>
    <text x="30" y="142">  \___/|_||_|_\___/_||_|_||_\___/ .__/</text>
    <text x="30" y="162">                                |_|    command line</text>
  </g>
  <text x="46" y="190"><tspan class="w">OnionHop CLI v3.4.5</tspan><tspan class="m">  -  route traffic through Tor</tspan></text>

  <!-- quick start -->
  <text x="30" y="228" class="w">Quick start:</text>
  <text x="46" y="254" class="c">connect</text>
  <text x="280" y="254" class="m">smart-connect to Tor (auto-picks the best route)</text>
  <text x="46" y="276" class="c">status</text>
  <text x="280" y="276" class="m">show the live connection dashboard</text>
  <text x="46" y="298" class="c">watch</text>
  <text x="280" y="298" class="m">continuously monitor the connection</text>
  <text x="46" y="320" class="c">scan obfs4</text>
  <text x="280" y="320" class="m">find which obfs4 bridges are reachable from here</text>
  <text x="46" y="342" class="c">help</text>
  <text x="280" y="342" class="m">full command reference</text>

  <!-- prompt -->
  <text x="30" y="384"><tspan class="p">onionhop&gt;</tspan><tspan class="w"> </tspan><tspan class="p">▍</tspan></text>
</svg>
